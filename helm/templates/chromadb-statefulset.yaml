apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "code-doc-assistant.fullname" . }}-chromadb
  labels:
    {{- include "code-doc-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: vectordb
spec:
  serviceName: {{ include "code-doc-assistant.fullname" . }}-chromadb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
      app.kubernetes.io/component: vectordb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
        app.kubernetes.io/component: vectordb
    spec:
      containers:
        - name: chromadb
          image: "{{ .Values.vectordb.image.repository }}:{{ .Values.vectordb.image.tag }}"
          imagePullPolicy: {{ .Values.vectordb.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.vectordb.service.port }}
              name: http
          env:
            - name: ANONYMIZED_TELEMETRY
              value: "false"
            # Pass the expected vector dimension for validation
            - name: EXPECTED_DIMENSION
              value: {{ include "code-doc-assistant.embeddingDimension" . | quote }}
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
  {{- if .Values.vectordb.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: chroma-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.vectordb.persistence.storageClass }}
        storageClassName: {{ .Values.vectordb.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.vectordb.persistence.size }}
  {{- end }}
