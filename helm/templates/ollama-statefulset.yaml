apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "code-doc-assistant.fullname" . }}-ollama
  labels:
    {{- include "code-doc-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  serviceName: {{ include "code-doc-assistant.fullname" . }}-ollama
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "code-doc-assistant.name" . }}
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ollama.service.port }}
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODEL
              value: {{ include "code-doc-assistant.ollamaModel" . }}
            {{- $inferenceConfig := include "code-doc-assistant.inferenceConfig" . | fromYaml }}
            {{- range $key, $value := $inferenceConfig }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- include "code-doc-assistant.ollamaResources" . | nindent 12 }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      # Init container: pull the LLM and embedding models before the main container starts
      initContainers:
        - name: model-pull
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          command:
            - bash
            - -c
            - |
              echo "Starting Ollama for model pull..."
              ollama serve &
              sleep 5
              echo "Pulling LLM model: {{ include "code-doc-assistant.ollamaModel" . }}"
              ollama pull {{ include "code-doc-assistant.ollamaModel" . }}
              echo "Pulling embedding model: {{ include "code-doc-assistant.embeddingModel" . }}"
              ollama pull {{ include "code-doc-assistant.embeddingModel" . }}
              echo "Model pull complete."
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          resources:
            {{- include "code-doc-assistant.ollamaResources" . | nindent 12 }}
  {{- if .Values.ollama.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: ollama-data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.ollama.persistence.storageClass }}
        storageClassName: {{ .Values.ollama.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.ollama.persistence.size }}
  {{- end }}
